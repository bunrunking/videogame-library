<mat-sidenav-container autosize>
    <mat-sidenav #sidenav fixedInViewport="true" mode="side" opened>
        <app-sidebar-navigation></app-sidebar-navigation>
    </mat-sidenav>

    <mat-sidenav-content>
        <mat-toolbar>
            <mat-toolbar-row>
                <mat-icon
                    class="sidenav-toggle"
                    role="button"
                    tabindex="0"
                    style="cursor: pointer; margin-right: 12px;"
                    (click)="sidenav.toggle()"
                    (keydown.enter)="sidenav.toggle()"
                    (keydown.space)="sidenav.toggle()"
                >
                    {{ sidenav.opened ? 'chevron_left' : 'chevron_right' }}
                </mat-icon>
                <span>
                    Shade and Friends Play Videogames
                </span>
            </mat-toolbar-row>
        </mat-toolbar>

        <div class="content-container">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
