<span>
    <img src="/assets/images/banner-small.png" alt="Banner Logo">
</span>

<mat-nav-list>
@for (link of routeLinks; track link) {
    <div>
      <a mat-list-item routerLink="{{ link.link }}">
        <mat-icon aria-hidden="true">{{ link.icon }}</mat-icon>
        <span class="link-label">{{ link.name }}</span>
      </a>
    </div>
}
</mat-nav-list>
